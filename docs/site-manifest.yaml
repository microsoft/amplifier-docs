# Site Manifest - Amplifier Documentation
# This file declares the scope and acceptance criteria for each documentation page.
# Used by the source-discovery pipeline to automatically place new source files.
#
# Fields:
#   path         - Doc-relative path to the rendered page
#   scope        - 1-2 sentence description of what this page covers and who it is for
#   accepts      - Semantic categories of source content that belong on this page.
#                  An LLM placement pass uses this list to decide whether a newly
#                  discovered source file is relevant.  Use noun phrases, not globs.
#   relationship - How source content maps to the page:
#                    DIRECT  = content is published verbatim / with minimal wrapping
#                    DERIVED = content is synthesised from sources into new prose
#                    REFERENCE = sources are cited/linked but not reproduced
#   priority     - Regeneration priority: high | medium | low
#   sources      - Current tracked source files, structured as {repo, path} pairs.
#                  Empty list means the page is manually maintained (no auto-sources).

# ---------------------------------------------------------------------------
# Acceptance protocols
# Rule-based pre-filters applied before the LLM placement step.
# A source must satisfy at least one matching protocol to be a candidate.
# ---------------------------------------------------------------------------
acceptance_protocols:

  public_python_api:
    description: "Public Python API surface"
    include:
      - "python/**/*.py"
      - "amplifier_foundation/**/*.py"
      - "amplifier_app_cli/**/*.py"
      - "amplifier_module_*/**/*.py"
    exclude:
      - "_*.py"
      - "test_*.py"
      - "**/__pycache__/**"
      - "**/_grpc_gen/**"
      - "**/conftest.py"
    min_lines: 20
    bonus_signals:
      - "exported in __init__.py"
      - "has module-level docstring"
      - "defines a public class or function"

  documentation:
    description: "Narrative documentation files"
    include:
      - "docs/**/*.md"
      - "*.md"
    exclude:
      - "docs/plans/**"
      - "CHANGELOG.md"
    min_lines: 30
    bonus_signals:
      - "referenced from README"
      - "contains code examples"

  contracts_and_specs:
    description: "Contract and specification documents"
    include:
      - "docs/contracts/*.md"
      - "docs/specs/*.md"
    always_accept: true

  examples:
    description: "Numbered example scripts"
    include:
      - "examples/*.py"
      - "examples/**/*.py"
    min_lines: 20
    bonus_signals:
      - "has top-level docstring explaining the example"
      - "runnable as __main__"

  rust_crates:
    description: "Rust crate source modules"
    include:
      - "crates/*/src/*.rs"
    exclude:
      - "**/generated/**"
      - "**/bridges/**"
    min_lines: 50
    bonus_signals:
      - "has corresponding Python shim"
      - "exported via pyo3"

  config_files:
    description: "Package manifests and configuration files"
    include:
      - "pyproject.toml"
      - "Cargo.toml"
      - "setup.cfg"
    always_accept: true

  agent_definitions:
    description: "Built-in agent persona and capability definition files"
    include:
      - "agents/*.md"
      - "agents/*.yaml"
    always_accept: true

